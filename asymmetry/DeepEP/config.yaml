# ==============================================================================
# vLLM Ascend DeepEP 自动化基准测试配置文件
# ==============================================================================
# 修改此文件后运行脚本即可，无需修改脚本代码

# ------------------------------------------------------------------------------
# 通用配置
# ------------------------------------------------------------------------------
common:
  # 模型路径
  model_path: "/home/cyj/weight/DSV2LiteWeight"
  # 日志根目录
  log_dir: "/home/cyj/run_vllm_v13/log"
  # 本地IP地址
  local_ip: "80.48.33.145"
  # 网络接口名
  network_interface: "enp209s0f3"
  # HTTP服务端口
  port: 8006
  # 张量并行大小
  tp: 1
  # 专家并行配置 (支持多个值，会遍历测试)
  expert_per_rank:
    - 8
    - 4

# ------------------------------------------------------------------------------
# 性能分析器配置
# ------------------------------------------------------------------------------
profiler:
  model_runner:
    enable: 1
    wait: 2
    warmup: 1
    active: 10
    repeat: 1
    skip_first: 1500
    dir: "/home/cyj/run_vllm_v13/profile"

# ------------------------------------------------------------------------------
# 环境配置
# ------------------------------------------------------------------------------
environment:
  pythonpath: "/home/cyj/code/v13/vllm-ascend:/home/cyj/code/v13/vllm"
  hccl_buffsize: 600
  ascend_toolkit_path: "/usr/local/Ascend/ascend-toolkit/latest/opp/vendors/CAM/bin/set_env.bash"

# ------------------------------------------------------------------------------
# 基准测试配置 (run_auto_benchmark.sh)
# ------------------------------------------------------------------------------
benchmark:
  # batch size 列表
  bsize_list: "48 80 96"
  # 数据并行大小列表 (支持多个值，会遍历测试)
  dp_list:
    - 8
    - 4
  # 输入长度列表 (StringConfig Input 的 MinValue/MaxValue，支持多个值，会遍历测试)
  input_len_list:
    - 4096
    - 8192
  # 数据量倍数
  data_multiplier: 16
  # 起始设备号
  start_device: 8

# ------------------------------------------------------------------------------
# ais_bench 配置
# ------------------------------------------------------------------------------
ais_bench:
  config_py: "/home/ttg_p2p/scripts/benchmark/ais_bench/benchmark/configs/datasets/synthetic/synthetic_gen_string.py"
  model_py: "/home/cyj/code/benchmark/ais_bench/benchmark/configs/models/vllm_api/vllm_api_stream_chat.py"
  # 预热配置
  warmup_request_count: 1536
  warmup_max_out_len: 2
  # 正式测试配置
  formal_max_out_len: 1024
